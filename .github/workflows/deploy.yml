# Deploy static site only after a PR is merged into main.
name: Deploy Pages
on:
  pull_request:
    types: [closed]
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - run: mkdir -p site && cp index.html site/ && cp -R viewer site/viewer
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
